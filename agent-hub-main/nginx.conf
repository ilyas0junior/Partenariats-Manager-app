server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA routing: any unknown path -> index.html
  location / {
    try_files $uri $uri/ /index.html;
  }


  # Static assets caching
  location ~* \.(?:css|js|mjs|map|json|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
    try_files $uri =404;
  }
}

